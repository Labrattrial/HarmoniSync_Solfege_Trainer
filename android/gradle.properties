org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Improve resilience to flaky networks (Maven timeouts, semaphore timeouts)
org.gradle.internal.http.connectionTimeout=60000
org.gradle.internal.http.socketTimeout=120000
# Prefer IPv4 to avoid certain ISP/VPN IPv6 issues reaching Google Maven
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true
